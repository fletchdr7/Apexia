name: EAS Update (OTA)

# Publishes an over-the-air JS/asset update to the "preview" channel whenever the
# app code changes. Installed preview builds pick it up on next launch — no
# rebuild needed. Native changes (new libraries, icon, permissions) still require
# a full `eas build`.
#
# One-time setup: add an EXPO_TOKEN repository secret
# (GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret).
# Create the token at https://expo.dev -> Account settings -> Access tokens.

on:
  push:
    branches:
      - main
      - cursor/apexia-fitness-app-foundation-e8c8
    paths:
      - "mobile/**"

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Publish update
        working-directory: mobile
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
