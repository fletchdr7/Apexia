name: EAS Update (OTA)

# Publishes an over-the-air JS/asset update to the "preview" channel whenever the
# app code changes. Installed preview builds pick it up on next launch — no
# rebuild needed. Native changes (new libraries, icon, permissions) still require
# a full `eas build`.
#
# One-time setup: add an EXPO_TOKEN repository secret
# (GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret).
# Create the token at https://expo.dev -> Account settings -> Access tokens.

on:
  # Manual trigger from the Actions tab (works even when no mobile/ files changed).
  workflow_dispatch:
  push:
    branches:
      - main
      - cursor/apexia-fitness-app-foundation-e8c8
    paths:
      - "mobile/**"

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Publish update
        working-directory: mobile
        env:
          # Passed via env (not inlined) so multi-line messages / special
          # characters can't break the shell command.
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MESSAGE="$(printf '%s' "$COMMIT_MSG" | head -n 1)"
          if [ -z "$MESSAGE" ]; then MESSAGE="Update ${GITHUB_SHA:0:7}"; fi
          eas update --branch preview --message "$MESSAGE" --non-interactive
